name: Android Debug Build

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm ci --legacy-peer-deps || npm install --legacy-peer-deps

      - name: Build web app
        run: npm run build

      - name: Capacitor sync
        run: npx cap sync android

      - name: Build debug APK
        run: |
          chmod +x android/gradlew
          cd android
          set -o pipefail
          ./gradlew assembleDebug --no-daemon 2>&1 | tee /tmp/gradle.log

      - name: Post failure log as commit comment
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          { echo "### ❌ Build failure log (tail)";
            echo '```';
            tail -c 55000 /tmp/gradle.log 2>/dev/null || echo "no gradle log";
            echo '```'; } > /tmp/body.md
          gh api "repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}/comments" -F "body=@/tmp/body.md" || true

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
