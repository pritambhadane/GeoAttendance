name: Android Debug Build

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  actions: write

env:
  HAS_KEYSTORE: ${{ secrets.RELEASE_KEYSTORE_BASE64 != '' }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm ci --legacy-peer-deps || npm install --legacy-peer-deps

      - name: Build web app
        run: npm run build

      - name: Capacitor sync
        run: npx cap sync android

      - name: Prepare release keystore
        if: ${{ env.HAS_KEYSTORE == 'true' }}
        env:
          KS: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: echo "$KS" | base64 -d > /tmp/release.keystore

      - name: Build APK (signed release when keystore secret exists, else debug)
        env:
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          chmod +x android/gradlew
          cd android
          set -o pipefail
          if [ "$HAS_KEYSTORE" = "true" ]; then
            export RELEASE_KEYSTORE_PATH=/tmp/release.keystore
            ./gradlew assembleRelease --no-daemon 2>&1 | tee /tmp/gradle.log
            cp app/build/outputs/apk/release/app-release.apk /tmp/geoattendance.apk
          else
            ./gradlew assembleDebug --no-daemon 2>&1 | tee /tmp/gradle.log
            cp app/build/outputs/apk/debug/app-debug.apk /tmp/geoattendance.apk
          fi

      - name: Post failure log as commit comment
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          { echo "### ❌ Build failure log (tail)";
            echo '```';
            tail -c 55000 /tmp/gradle.log 2>/dev/null || echo "no gradle log";
            echo '```'; } > /tmp/body.md
          gh api "repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}/comments" -F "body=@/tmp/body.md" || true

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: geoattendance-apk
          path: /tmp/geoattendance.apk
          retention-days: 7

      - name: Trim old artifacts (keep newest 5)
        if: always()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api "repos/${{ github.repository }}/actions/artifacts?per_page=100" \
            --jq '.artifacts | map(select(.expired == false)) | sort_by(.created_at) | reverse | .[5:] | .[].id' \
          | while read -r id; do
              [ -n "$id" ] && gh api -X DELETE "repos/${{ github.repository }}/actions/artifacts/$id" || true
            done
