workflows:
  android-build:
    name: Android Debug Build
    max_build_duration: 30
    environment:
      node: 22.12.0
      java: 17
    scripts:
      - name: Pin Capacitor to 6.x and install dependencies
        script: |
          npm pkg set \
            dependencies.@capacitor/android="6.2.0" \
            dependencies.@capacitor/core="6.2.0" \
            dependencies.@capacitor/app="6.0.3" \
            dependencies.@capacitor/geolocation="6.1.1" \
            dependencies.@capacitor/local-notifications="6.1.3" \
            devDependencies.@capacitor/cli="6.2.0"
          npm install --legacy-peer-deps

      - name: Build web app
        script: npm run build

      - name: Capacitor add android (if not present)
        script: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Capacitor sync
        script: npx cap sync android

      - name: Build debug APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

    artifacts:
      - android/app/build/outputs/apk/debug/app-debug.apk
