workflows:
  android-build:
    name: Android Debug Build
    max_build_duration: 60
    environment:
      node: 22.12.0
      java: 17
    scripts:
      - name: Pin Capacitor to 6.x and install dependencies
        script: |
          npm pkg set \
            dependencies.@capacitor/android="6.2.0" \
            dependencies.@capacitor/core="6.2.0" \
            dependencies.@capacitor/app="6.0.3" \
            dependencies.@capacitor/geolocation="6.1.1" \
            dependencies.@capacitor/local-notifications="6.1.3" \
            devDependencies.@capacitor/cli="6.2.0"
          npm install --legacy-peer-deps

      - name: Build web app
        script: npm run build

      - name: Capacitor add android (if not present)
        script: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Capacitor sync
        script: npx cap sync android

      - name: Build debug APK using Gradle wrapper
        script: |
          cd android
          # Use the project's Gradle wrapper (pinned to 8.14.3), which matches
          # AGP 8.13. Brew's system Gradle is 9.6+ now and AGP 8.x is
          # incompatible with it (Gradle removed an internal API in 9.6).
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

    artifacts:
      - android/app/build/outputs/apk/debug/app-debug.apk
