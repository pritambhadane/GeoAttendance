workflows:
  android-build:
    name: Android Debug Build
    max_build_duration: 60
    environment:
      node: 22.12.0
      java: 17
    scripts:
      - name: Pin Capacitor to 6.x and install dependencies
        script: |
          npm pkg set \
            dependencies.@capacitor/android="6.2.0" \
            dependencies.@capacitor/core="6.2.0" \
            dependencies.@capacitor/app="6.0.3" \
            dependencies.@capacitor/geolocation="6.1.1" \
            dependencies.@capacitor/local-notifications="6.1.3" \
            devDependencies.@capacitor/cli="6.2.0"
          npm install --legacy-peer-deps

      - name: Build web app
        script: npm run build

      - name: Capacitor add android (if not present)
        script: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Capacitor sync
        script: npx cap sync android

      - name: Pin Gradle to 8.7 (stable, JDK17 compatible)
        script: |
          WRAPPER="android/gradle/wrapper/gradle-wrapper.properties"
          # Cap sync upgrades gradle to 8.14.3 which times out on download
          # 8.7 is stable, JDK17 compatible, and downloads reliably
          cat > "$WRAPPER" << 'PROPS'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.7-all.zip
          networkTimeout=120000
          validateDistributionUrl=true
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          PROPS
          echo "Gradle wrapper pinned to 8.7"
          cat "$WRAPPER"

      - name: Patch AGP version to match Gradle 8.7
        script: |
          # AGP 8.2.1 (default for cap 6) requires Gradle >=8.2, works fine with 8.7
          # No AGP change needed — just verify
          grep "com.android.tools.build:gradle" android/build.gradle || true

      - name: Build debug APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

    artifacts:
      - android/app/build/outputs/apk/debug/app-debug.apk
